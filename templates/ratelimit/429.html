<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>درخواست بیش از حد — جت‌پی‌۲۴</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Vazirmatn', system-ui, sans-serif; background: #f8f9fa; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .box { max-width: 480px; width: 100%; }
    </style>
</head>
<body>
    <div class="box px-3">
        <div class="alert alert-danger shadow-sm" role="alert">
            <h5 class="alert-heading fw-bold mb-2">درخواست بیش از حد مجاز</h5>
            <p class="mb-0">{{ message }}</p>
        </div>
        <a href="javascript:history.back()" class="btn btn-outline-secondary">بازگشت</a>
    </div>
</body>
</html>
